<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Smart To-Do with Timers</title>
    <meta name="description" content="A production-ready to-do app with persistent storage and per-task timers.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <main class="app-shell">
        <header class="app-header card reveal">
            <div>
                <p class="eyebrow">Productive Every Day</p>
                <h1>TaskFlow</h1>
                <p class="subtitle">Plan work, track time, and finish tasks faster.</p>
            </div>
            <div class="stats-grid" id="stats-grid" aria-live="polite">
                <div class="stat-item">
                    <span class="stat-label">Total</span>
                    <strong id="total-tasks">0</strong>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed</span>
                    <strong id="completed-tasks">0</strong>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Running</span>
                    <strong id="running-timers">0</strong>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Time Today</span>
                    <strong id="time-today">00:00:00</strong>
                </div>
            </div>
        </header>

        <section class="task-panel card reveal reveal-delay-1">
            <form id="task-form" class="task-form" autocomplete="off">
                <div class="field-wrap">
                    <label for="task-input">Task</label>
                    <input type="text" id="task-input" name="task" placeholder="Write a task name" maxlength="120"
                        required>
                </div>
                <div class="field-wrap small">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority" name="priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="field-wrap small">
                    <label for="task-date">Due Date</label>
                    <input type="date" id="task-date" name="dueDate">
                </div>
                <button type="submit" class="btn btn-primary">Add Task</button>
            </form>

            <div class="toolbar">
                <div class="search-wrap">
                    <input type="search" id="search-input" placeholder="Search tasks..." aria-label="Search tasks">
                </div>
                <div class="filters" role="group" aria-label="Task filters">
                    <button class="btn btn-filter is-active" data-filter="all" type="button">All</button>
                    <button class="btn btn-filter" data-filter="active" type="button">Active</button>
                    <button class="btn btn-filter" data-filter="completed" type="button">Done</button>
                </div>
            </div>

            <ul id="task-list" class="task-list" aria-live="polite"></ul>

            <div id="empty-state" class="empty-state">
                <h2>No tasks found</h2>
                <p>Add a new task or change your search/filter.</p>
            </div>

            <div class="actions-row">
                <button id="clear-completed" class="btn btn-danger" type="button">Clear Completed</button>
            </div>
        </section>
    </main>

    <template id="task-template">
        <li class="task-item">
            <div class="task-main">
                <label class="check-wrap">
                    <input type="checkbox" class="task-check" aria-label="Mark task complete">
                    <span class="check-indicator"></span>
                </label>
                <div class="task-content">
                    <div class="task-topline">
                        <h3 class="task-title"></h3>
                        <span class="pill priority-pill"></span>
                    </div>
                    <div class="task-meta"></div>
                </div>
            </div>
            <div class="task-controls">
                <span class="timer-display">00:00:00</span>
                <div class="timer-buttons">
                    <button class="btn btn-ghost start-pause-btn" type="button">Start</button>
                    <button class="btn btn-ghost reset-btn" type="button">Reset</button>
                    <button class="btn btn-ghost delete-btn" type="button">Delete</button>
                </div>
            </div>
        </li>
    </template>

    <script src="script.js"></script>
</body>

</html>
